<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - AtvdJulian</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <div class="login-container">
      <div class="login-box">
        <div class="login-header">
          <div class="logo-circle">
            <i class="fas fa-user-circle"></i>
          </div>
          <h1>Bem-vindo</h1>
          <p class="subtitle">Faça login para continuar</p>
        </div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">
              <i class="fas fa-envelope"></i>
              Email ou Usuário
            </label>
            <input 
              type="email" 
              id="email" 
              name="email" 
              placeholder="seu@email.com" 
              required
            />
          </div>

          <div class="form-group">
            <label for="password">
              <i class="fas fa-lock"></i>
              Senha
            </label>
            <div class="password-wrapper">
              <input 
                type="password" 
                id="password" 
                name="password" 
                placeholder="Digite sua senha" 
                required
              />
              <button type="button" class="toggle-password" id="togglePassword">
                <i class="fas fa-eye"></i>
              </button>
            </div>
          </div>

          <div class="remember-forgot">
            <label class="remember">
              <input type="checkbox" name="remember" />
              <span>Lembrar de mim</span>
            </label>
            <a href="#" class="forgot-password">Esqueceu a senha?</a>
          </div>

          <button type="submit" class="login-btn">
            <i class="fas fa-sign-in-alt"></i>
            Entrar
          </button>
        </form>

        <div class="divider">
          <span>ou</span>
        </div>

        <div class="social-login">
          <button type="button" class="social-btn google" title="Login com Google">
            <i class="fab fa-google"></i>
          </button>
          <button type="button" class="social-btn github" title="Login com GitHub">
            <i class="fab fa-github"></i>
          </button>
          <button type="button" class="social-btn facebook" title="Login com Facebook">
            <i class="fab fa-facebook-f"></i>
          </button>
        </div>

        <div class="signup-link">
          Não tem conta? <a href="#">Cadastre-se aqui</a>
        </div>
      </div>

      <div class="login-side">
        <div class="side-content">
          <h2>AtvdJulian</h2>
          <p>Sua plataforma de aprendizado</p>
          <div class="features">
            <div class="feature">
              <i class="fas fa-lightning-bolt"></i>
              <span>Rápido e fácil</span>
            </div>
            <div class="feature">
              <i class="fas fa-shield-alt"></i>
              <span>Seguro</span>
            </div>
            <div class="feature">
              <i class="fas fa-users"></i>
              <span>Comunidade</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
